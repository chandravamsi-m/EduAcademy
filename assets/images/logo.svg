<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Gradients and Shadow Definitions -->
  <defs>
    <linearGradient id="logo-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4f46e5" />
      <stop offset="100%" stop-color="#0d9488" />
    </linearGradient>
    <linearGradient id="glow-grad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0d9488" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#4f46e5" stop-opacity="0.8" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="3" stdDeviation="2" flood-color="#4f46e5" flood-opacity="0.2" />
    </filter>
  </defs>

  <!-- Glowing background elements -->
  <circle cx="32" cy="32" r="28" fill="url(#glow-grad)" opacity="0.1" />

  <!-- Outer Ring with dash array for modern techy educational feel -->
  <circle cx="32" cy="32" r="26" stroke="url(#logo-grad)" stroke-width="1.5" stroke-dasharray="8 6" opacity="0.4" />

  <!-- Main stylized logo mark: Stylized Graduation Cap and Book combined -->
  <g filter="url(#shadow)">
    <!-- Book Pages / Wings -->
    <path d="M16 38C22 38 28 41 32 44C36 41 42 38 48 38V22C42 22 36 25 32 28C28 25 22 22 16 22V38Z" fill="url(#logo-grad)" />
    
    <!-- Central Spine of the book -->
    <path d="M32 28V44" stroke="#ffffff" stroke-width="2" stroke-linecap="round" />

    <!-- Stylized Graduation Cap Diamond floating above the book -->
    <polygon points="32,10 48,17 32,24 16,17" fill="url(#logo-grad)" />
    <!-- White inner diamond highlights for premium styling -->
    <polygon points="32,12 44,17 32,22 20,17" fill="#ffffff" opacity="0.25" />

    <!-- Tassel hanging from cap -->
    <path d="M40 20.5V26.5C40 28.5 39 30 37.5 30" stroke="url(#logo-grad)" stroke-width="1.5" stroke-linecap="round" />
    <circle cx="37.5" cy="30" r="1.5" fill="url(#logo-grad)" />
  </g>
</svg>
