<!DOCTYPE html>
<html lang="en" class="theme-transition">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up — EduAcademy</title>
  <link rel="icon" type="image/svg+xml" href="../assets/images/logo.svg">
  
  <!-- CSS Stylesheets -->
  <link class="theme-style" rel="stylesheet" href="../assets/css/style.css">
  <link rel="stylesheet" href="../assets/css/dark-mode.css">
  <link rel="stylesheet" href="../assets/css/rtl.css">
  
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary: {
              DEFAULT: '#4f46e5',
              light: '#e0e7ff',
              dark: '#3730a3',
              hover: '#4338ca',
            },
            secondary: {
              DEFAULT: '#0d9488',
              light: '#ccfbf1',
              dark: '#115e59',
              hover: '#0f766e',
            }
          },
          fontFamily: {
            heading: ['Outfit', 'sans-serif'],
            body: ['Inter', 'sans-serif'],
          }
        }
      }
    }
  </script>
  
  <!-- Lucide Icons CDN -->
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-100 text-slate-900 dark:bg-slate-950 dark:text-slate-100 font-body min-h-screen flex items-center justify-center relative p-4 transition-colors duration-300">
  
  <!-- Top Right Icons (Dark Mode and RTL) -->
  <div class="absolute top-4 right-4 rtl:right-auto rtl:left-4 flex items-center space-x-2 rtl:space-x-reverse z-50">
    <button class="rtl-toggle-btn h-9 px-3 border border-slate-300 dark:border-slate-700 rounded-xl text-slate-700 dark:text-slate-200 font-medium hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors focus-ring text-xs flex items-center justify-center" aria-label="Toggle LTR/RTL">
          RTL
        </button>
    <button class="theme-toggle-btn w-9 h-9 border border-slate-300 dark:border-slate-700 rounded-xl text-slate-700 dark:text-slate-200 font-medium hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors focus-ring text-xs flex items-center justify-center" aria-label="Toggle Theme">
      <i data-lucide="sun" class="w-5 h-5 block dark:hidden"></i>
      <i data-lucide="moon" class="w-5 h-5 hidden dark:block"></i>
    </button>
  </div>

  <!-- Sign Up Card Container -->
  <div class="w-full max-w-md bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-2xl sm:rounded-3xl p-6 sm:p-8 shadow-2xl space-y-6 relative z-10 page-transition">
    <!-- Logo Inside Card -->
    <div class="text-center space-y-2">
            <a href="index.html" class="inline-flex items-center space-x-2">
        <img src="../assets/images/logo.svg" alt="EduAcademy Logo" class="w-10 h-10 text-primary">
        <span class="text-xl font-bold bg-gradient-to-r from-primary to-secondary bg-clip-text text-transparent">EduAcademy</span>
      </a>
      <h2 class="text-2xl font-bold text-slate-900 dark:text-white pt-2">Create Free Account</h2>
      <p class="text-xs text-slate-500 dark:text-slate-400">Get access to standard resources and curriculum lessons</p>
    </div>

    <!-- Sign Up Form -->
    <form class="space-y-4" onsubmit="event.preventDefault(); window.location.href='user-dashboard.html'">
      <!-- Full Name -->
      <div class="space-y-1">
        <label class="text-xs font-bold text-slate-650 dark:text-slate-355">Full Name</label>
        <div class="relative flex items-center">
          <i data-lucide="user" class="w-4 h-4 absolute left-3.5 rtl:left-auto rtl:right-3.5 text-slate-400"></i>
          <input type="text" placeholder="John Doe" required class="w-full bg-slate-50 dark:bg-slate-950 border border-slate-300 dark:border-slate-700 rounded-xl pl-10 pr-4 rtl:pl-4 rtl:pr-10 py-2.5 text-sm outline-none focus:ring-1 focus:ring-primary focus:border-primary text-slate-800 dark:text-slate-100">
        </div>
      </div>

      <!-- Email -->
      <div class="space-y-1">
        <label class="text-xs font-bold text-slate-650 dark:text-slate-355">Email Address</label>
        <div class="relative flex items-center">
          <i data-lucide="mail" class="w-4 h-4 absolute left-3.5 rtl:left-auto rtl:right-3.5 text-slate-400"></i>
          <input type="email" placeholder="you@example.com" required class="w-full bg-slate-50 dark:bg-slate-950 border border-slate-300 dark:border-slate-700 rounded-xl pl-10 pr-4 rtl:pl-4 rtl:pr-10 py-2.5 text-sm outline-none focus:ring-1 focus:ring-primary focus:border-primary text-slate-800 dark:text-slate-100">
        </div>
      </div>
      <!-- Password -->
      <div class="space-y-1">
        <label class="text-xs font-bold text-slate-650 dark:text-slate-355">Password</label>
        <div class="relative flex items-center">
          <i data-lucide="lock" class="w-4 h-4 absolute left-3.5 rtl:left-auto rtl:right-3.5 text-slate-400"></i>
          <input type="password" id="signup-pass" placeholder="••••••••" required class="w-full bg-slate-50 dark:bg-slate-950 border border-slate-300 dark:border-slate-700 rounded-xl pl-10 pr-10 py-2.5 text-sm outline-none focus:ring-1 focus:ring-primary focus:border-primary text-slate-800 dark:text-slate-100">
          <button type="button" onclick="togglePassVisibility('signup-pass', 'eye-open-s', 'eye-closed-s')" class="absolute right-3.5 rtl:right-auto rtl:left-3.5 text-slate-400 hover:text-slate-655 dark:hover:text-slate-200">
            <i data-lucide="eye" id="eye-open-s" class="w-4.5 h-4.5 block"></i>
            <i data-lucide="eye-off" id="eye-closed-s" class="w-4.5 h-4.5 hidden"></i>
          </button>
        </div>
      </div>

      <!-- Confirm Password -->
      <div class="space-y-1">
        <label class="text-xs font-bold text-slate-650 dark:text-slate-355">Confirm Password</label>
        <div class="relative flex items-center">
          <i data-lucide="lock" class="w-4 h-4 absolute left-3.5 rtl:left-auto rtl:right-3.5 text-slate-400"></i>
          <input type="password" id="signup-pass-confirm" placeholder="••••••••" required class="w-full bg-slate-50 dark:bg-slate-950 border border-slate-300 dark:border-slate-700 rounded-xl pl-10 pr-10 py-2.5 text-sm outline-none focus:ring-1 focus:ring-primary focus:border-primary text-slate-800 dark:text-slate-100">
          <button type="button" onclick="togglePassVisibility('signup-pass-confirm', 'eye-open-sc', 'eye-closed-sc')" class="absolute right-3.5 rtl:right-auto rtl:left-3.5 text-slate-400 hover:text-slate-650 dark:hover:text-slate-200">
            <i data-lucide="eye" id="eye-open-sc" class="w-4.5 h-4.5 block"></i>
            <i data-lucide="eye-off" id="eye-closed-sc" class="w-4.5 h-4.5 hidden"></i>
          </button>
        </div>
      </div>

      <!-- Terms and Conditions Checkbox -->
      <div class="flex items-start space-x-2.5">
        <input type="checkbox" id="terms-agree" required class="w-4 h-4 rounded text-primary focus:ring-primary cursor-pointer mt-0.5">
        <label for="terms-agree" class="text-xs text-slate-500 dark:text-slate-400 cursor-pointer select-none leading-tight">
          I agree to the Terms of Service & Privacy Policy
        </label>
      </div>

      <!-- Submit -->
      <button type="submit" class="w-full py-3 bg-primary hover:bg-primary/95 text-white font-bold rounded-xl transition-all shadow-lg shadow-indigo-500/10">
        Sign Up
      </button>
    </form>

    <!-- Social Sign In divider -->
    <div class="relative flex items-center justify-center pt-2">
      <div class="absolute inset-x-0 h-px bg-slate-200 dark:bg-slate-800"></div>
      <span class="relative bg-white dark:bg-slate-900 px-3 text-[10px] uppercase font-bold text-slate-400">Or continue with</span>
    </div>

    <!-- Social Buttons -->
    <div class="grid grid-cols-3 gap-3">
      <button onclick="window.location.href='user-dashboard.html'" class="flex items-center justify-center gap-1.5 py-2.5 border border-slate-200 dark:border-slate-800 rounded-xl hover:bg-slate-50 dark:hover:bg-slate-800 text-xs font-semibold text-slate-700 dark:text-slate-300">
        <svg class="w-4 h-4" viewBox="0 0 24 24" fill="currentColor">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22.81-.63z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.52 6.16-4.52z" fill="#EA4335"/>
        </svg>
        <span class="hidden sm:inline">Google</span>
      </button>
      <button onclick="window.location.href='user-dashboard.html'" class="flex items-center justify-center gap-1.5 py-2.5 border border-slate-200 dark:border-slate-800 rounded-xl hover:bg-slate-50 dark:hover:bg-slate-800 text-xs font-semibold text-slate-700 dark:text-slate-300">
        <svg class="w-4 h-4 text-[#1877F2]" viewBox="0 0 24 24" fill="currentColor">
          <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
        </svg>
        <span class="hidden sm:inline">Facebook</span>
      </button>
      <button onclick="window.location.href='user-dashboard.html'" class="flex items-center justify-center gap-1.5 py-2.5 border border-slate-200 dark:border-slate-800 rounded-xl hover:bg-slate-50 dark:hover:bg-slate-800 text-xs font-semibold text-slate-700 dark:text-slate-300">
        <svg class="w-4 h-4 text-slate-900 dark:text-white" viewBox="0 0 24 24" fill="currentColor">
          <path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.81-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M15.97 4.17c.66-.81 1.11-1.93.99-3.06-1 .04-2.2.67-2.92 1.49-.62.71-1.16 1.85-1.01 2.96 1.11.09 2.23-.57 2.94-1.39z"/>
        </svg>
        <span class="hidden sm:inline">Apple</span>
      </button>
    </div>

    <!-- Login redirect -->
    <div class="text-center text-xs text-slate-500 dark:text-slate-455 pt-2 border-t border-slate-100 dark:border-slate-800">
      Already have an account? <a href="login.html" class="text-primary font-bold hover:underline">Log in here</a>
    </div>
  </div>

  <!-- Main JavaScript -->
  <script src="../assets/js/main.js"></script>
  <script>
    lucide.createIcons();

    function togglePassVisibility(id, eyeOpenId, eyeClosedId) {
      const input = document.getElementById(id);
      const open = document.getElementById(eyeOpenId);
      const closed = document.getElementById(eyeClosedId);
      
      if (input.type === 'password') {
        input.type = 'text';
        open.classList.add('hidden');
        closed.classList.remove('hidden');
      } else {
        input.type = 'password';
        open.classList.remove('hidden');
        closed.classList.add('hidden');
      }
    }
  </script>
</body>
</html>
